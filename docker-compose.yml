version: "3.9"

services:
  strm-cas:
    build:
      context: .
      dockerfile: Dockerfile
    image: strm-cas:latest
    container_name: strm-cas
    restart: unless-stopped
    ports:
      - "18457:18457"
    environment:
      TZ: Asia/Shanghai
      STRM_CAS_LISTEN: ":18457"
      STRM_CAS_STRM_ROOT: /data/strm
      STRM_CAS_CACHE_DIR: /data/cache
      STRM_CAS_DOWNLOAD_DIR: /data/download
      # 状态数据库：/data/strm-cas.db
      STRM_CAS_DB_PATH: /data/strm-cas.db
      # 汇总日志：/data/strm-cas-summary.json
      STRM_CAS_LOG_PATH: /data/strm-cas-summary.json
      # STRM_CAS_HTTP_TIMEOUT: 30m
    volumes:
      # 宿主机 ./data 会包含：strm/ cache/ download/ strm-cas.db / strm-cas-summary.json
      - ./data:/data
    command: ["strm-cas-api"]

  # 手动执行一次扫描示例：
  # docker compose run --rm strm-cas-job strm-cas -scan-strm
  strm-cas-job:
    build:
      context: .
      dockerfile: Dockerfile
    image: strm-cas:latest
    profiles: ["manual"]
    environment:
      TZ: Asia/Shanghai
      STRM_CAS_STRM_ROOT: /data/strm
      STRM_CAS_CACHE_DIR: /data/cache
      STRM_CAS_DOWNLOAD_DIR: /data/download
      STRM_CAS_DB_PATH: /data/strm-cas.db
      STRM_CAS_LOG_PATH: /data/strm-cas-summary.json
    volumes:
      - ./data:/data
    entrypoint: ["strm-cas"]
    command: ["-scan-strm"]
